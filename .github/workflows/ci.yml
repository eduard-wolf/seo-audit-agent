name: CI

on:
  push:
  pull_request:

jobs:
  test-and-scan:
    name: Test & Leak Scan
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax check (node --check, dependency-free)
        run: npm run lint

      - name: Run tests
        run: npm test

      # Deterministic, key-free evals of the LLM interpret step against the
      # committed golden snapshot (eval/runs + eval/baseline.json). No model
      # call, no ANTHROPIC_API_KEY — scores the snapshot and gates on
      # hard invariants + no-regression vs baseline + conservative floor.
      - name: Evals (deterministic, key-free)
        run: npm run eval

      - name: Run leak scan
        if: always()
        run: npm run leak-scan

  python-checks:
    name: Python Lint, Type & Test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Only the dev tools — the skip-path + mocked tests need none of the heavy
      # runtime deps (google-api-python-client, psycopg, pgvector).
      - name: Install dev tools
        run: pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check crawl/gsc.py kb/pgvector_store.py tests/python/

      - name: Mypy (type check)
        run: mypy crawl/gsc.py kb/pgvector_store.py

      - name: Pytest
        run: python -m pytest tests/python -q
